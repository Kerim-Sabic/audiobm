# Netlify konfiguracija — Svijet Sluha (Next.js 16 + Payload CMS 3)
#
# Rutiranjem (uključujući osvježavanje i direktne linkove) upravlja Netlify
# OpenNext adapter za Next.js — NE dodavati "/* -> /index.html"
# preusmjeravanja: ona lome serverske rute Next aplikacije.
#
# OBAVEZNE varijable okruženja (Site settings → Environment variables):
#   PAYLOAD_SECRET          dug nasumičan niz
#   DATABASE_URL            postgres://... (Neon/Supabase, EU region!)
#                           — SQLite NE radi na Netlifyju (datoteke se ne čuvaju)
#   NEXT_PUBLIC_SERVER_URL  https://vaš-sajt.netlify.app ili https://audiobm.ba
#   S3_BUCKET, S3_REGION, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY
#   (+ S3_ENDPOINT za Cloudflare R2/Backblaze) — trajno skladište slika;
#   lokalni "media/" folder se na Netlify funkcijama ne čuva između poziva
#   SMTP_HOST/PORT/USER/PASS + EMAIL_FROM + EMAIL_TO — slanje e-pošte
#
# Build pokreće seed prije Next builda. Seed je idempotentan: na svježoj bazi
# kreira početni sadržaj, a na postojećoj preskače već unesene zapise.

[build]
  command = "pnpm seed && pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

# Keširanje statičkih resursa (Next runtime postavlja vlastite za /_next/*)
[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Kanonski host: www → apex (bez www), trajno 301 — sprječava duplikat sadržaja
# i objedinjuje SEO „snagu" na jedan host. Mijenjati domenu ako apex ima www kao primarni.
[[redirects]]
  from = "https://www.svijetsluha.com/*"
  to = "https://svijetsluha.com/:splat"
  status = 301
  force = true

# Sigurnosna zaglavlja
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
